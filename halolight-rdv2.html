<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réserver un rendez-vous — HaloLight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      color: #1C1A17;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    .header {
      width: 100%;
      padding: 2rem 2rem 0;
      display: flex;
      justify-content: center;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #9B9189;
    }

    /* HERO */
    .hero {
      width: 100%;
      max-width: 780px;
      padding: 2rem 2rem 0.5rem;
      text-align: center;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .hero-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #A07C3E;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 5.5vw, 3.8rem);
      line-height: 1.12;
      color: #1C1A17;
      letter-spacing: -0.01em;
    }

    .hero h1 em {
      font-style: italic;
      color: #A07C3E;
      font-weight: 400;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: #A07C3E;
      margin: 1.25rem auto 0;
      opacity: 0.5;
    }

    /* BOOKING */
    .booking {
      width: 100%;
      flex: 1;
      padding: 1.5rem 0 0;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .booking iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 600px;
      border: none;
    }

    /* FOOTER */
    .footer {
      width: 100%;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #EEE9E3;
      font-size: 0.75rem;
      color: #A09890;
      font-weight: 300;
    }

    .footer a { color: #A09890; text-decoration: none; }
    .footer a:hover { color: #A07C3E; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .hero { padding: 1.5rem 1.25rem 0.5rem; }
      .booking { padding: 1rem 0 0; }
      .booking iframe {
        height: calc(100vh - 180px);
        min-height: 500px;
      }
      .footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <span class="logo">HaloLight</span>
    </header>

    <section class="hero">
      <span class="hero-label">Prise de rendez-vous</span>
      <h1>Choisissez le type de<br>rendez-vous qui vous <em>convient</em></h1>
      <div class="divider"></div>
    </section>

    <div class="booking">
      <iframe
        src="https://meet.brevo.com/halolight-rdv/borderless"
        frameborder="0"
        width="100%"
        title="Réserver un rendez-vous HaloLight"
        allow="camera; microphone"
      ></iframe>
    </div>

    <footer class="footer">
      <span>© 2025 HaloLight — HaloCorp OÜ</span>
      <a href="mailto:contact@halolight.fr">contact@halolight.fr</a>
    </footer>

  </div>
</body>
</html>
