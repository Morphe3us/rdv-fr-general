<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réserver un appel découverte — Photobooth HaloLight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      color: #1C1A17;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      padding: 1.75rem 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #9B9189;
    }

    .trust {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 300;
      color: #7A7470;
    }

    .trust-item svg {
      color: #A07C3E;
      flex-shrink: 0;
    }

    .trust-sep {
      width: 1px;
      height: 10px;
      background: #D9D2CA;
    }

    .header-line {
      width: 40px;
      height: 1px;
      background: #A07C3E;
      opacity: 0.4;
    }

    .booking {
      width: 100%;
      flex: 1;
      padding: 0 1.5rem 2rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .booking iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 150px);
      min-height: 620px;
      border: none;
    }

    .footer {
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #F0EBE4;
      font-size: 0.72rem;
      color: #C0B8B0;
      font-weight: 300;
    }

    .footer a { color: #C0B8B0; text-decoration: none; }
    .footer a:hover { color: #A07C3E; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .trust-sep { display: none; }
      .booking { padding: 0 0 1.5rem; }
      .booking iframe { height: calc(100vh - 140px); min-height: 560px; }
      .footer { flex-direction: column; gap: 0.3rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <span class="logo">HaloLight</span>
      <div class="trust">
        <div class="trust-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>
          Gratuit &amp; sans engagement
        </div>
        <div class="trust-sep"></div>
        <div class="trust-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          +300 professionnels accompagnés
        </div>
      </div>
      <div class="header-line"></div>
    </header>

    <div class="booking">
      <iframe
        src="https://meet.brevo.com/halolight-rdv/borderless?l=decouverte"
        frameborder="0"
        width="100%"
        title="Réserver un appel découverte Photobooth — HaloLight"
        allow="camera; microphone"
      ></iframe>
    </div>

    <footer class="footer">
      <span>© 2025 HaloLight — HaloCorp OÜ</span>
      <a href="mailto:contact@halolight.fr">contact@halolight.fr</a>
    </footer>

  </div>
</body>
</html>
